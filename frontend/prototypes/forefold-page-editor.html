                  { label: "Long-term commitments reduce overcapacity risk", value: "Strong" },
                  { label: "Refusing a broad price war protects margin but slows share gain", value: "Mixed" }
                ]),
                makeBlock("scenario-outcomes", "bars", "Possible futures", "Outcome paths", "Show the recommendation under leadership, cycle benefit, and demand slowdown cases.", "full", "standard", "ReportView.vue", [
                  { label: "Leadership case", value: "66" },
                  { label: "Cycle-benefit case", value: "49" },
                  { label: "Downside case", value: "36" }
                ]),
                makeBlock("report-evidence", "split", "Evidence", "Claims, assumptions, and contradictions", "Keep sourced facts distinct from generated interpretations and unresolved internal facts.", "full", "tall", "ReportView.vue", [
                  { label: "Sourced claims", value: "209" },
                  { label: "Generated assumptions", value: "6" },
                  { label: "Internal facts needed", value: "3" },
                  { label: "Contradictions", value: "0" }
                ]),
                makeBlock("core-memo", "memo", "Deliverable", "Executive report", "Summarize the recommendation, scenario evolution, warning signals, competitive countermeasures, and management reversal points.", "full", "tall", "ReportView.vue", [
                  { label: "Recommendation", value: "Expand only against committed demand." },
                  { label: "Warning signal", value: "Qualification delays or weaker customer commitments." },
                  { label: "Management action", value: "Accelerate contracted HBM4; pause unsecured commodity capex." }
                ])
              ]
            },
            {
              id: "decision",
              step: "05 / Decision refinement",
              title: "Ask only for information that could change the decision",
              description: "Rank internal questions, update the tree, and stop when another answer is no longer material.",
              feedback: [],
              blocks: [
                makeBlock("decision-hero", "hero", "FOREFOLD report refinement", "Samsung HBM4 Capacity Strategy", "The completed simulation report is the evidence base. Refinement asks only for bounded, high-value internal facts.", "full", "tall", "DecisionWorkspaceView.vue", [
                  { label: "Evidence claims", value: "209" },
                  { label: "Decision paths", value: "4" },
                  { label: "Facts still needed", value: "3" }
                ]),
                makeBlock("stop-evaluation", "list", "Continue-or-stop evaluation", "Keep learning", "Continue while a remaining internal question has a material chance of changing the recommendation.", "half", "standard", "DecisionWorkspaceView.vue", [
                  { label: "Highest question priority", value: "69%" },
                  { label: "Leading margin", value: "17%" },
                  { label: "Stop condition", value: "Not met" }
                ]),
                makeBlock("recommendation", "list", "Current recommendation", "Driven largely by AI-memory demand", "The leading path remains explicit while private evidence can strengthen, weaken, or prune alternatives.", "half", "standard", "DecisionWorkspaceView.vue", [
                  { label: "Leading path", value: "66%" },
                  { label: "Runner-up", value: "49%" },
                  { label: "Status", value: "Interim" }
                ]),
                makeBlock("decision-model", "split", "Shadow decision analysis", "Human confirmation required", "Utilities, consequences, distributions, and constraints must be confirmed before deterministic analysis is calculated.", "full", "standard", "DecisionWorkspaceView.vue", [
                  { label: "Actions", value: "Awaiting confirmation" },
                  { label: "Consequences", value: "Awaiting confirmation" },
                  { label: "Probability distributions", value: "Awaiting confirmation" },
                  { label: "Utility model", value: "Awaiting confirmation" }
                ]),
                makeBlock("decision-tree", "tree", "Core report", "Decision knowledge tree", "Each private answer grows a new branch and revises only the decision paths it can change.", "full", "tall", "DecisionWorkspaceView.vue", [
                  { label: "Decision root", value: "Samsung capacity strategy" },
                  { label: "Public path", value: "AI-memory demand" },
                  { label: "Private fact #1", value: "Budget approval" },
                  { label: "Private fact #2", value: "Team capacity" },
                  { label: "Private fact #3", value: "Outcome threshold" }
                ]),
                makeBlock("internal-questions", "questions", "Next best question", "Internal questions", "Ask a bounded number of questions ranked by their expected ability to change the recommendation.", "full", "tall", "DecisionWorkspaceView.vue", [
                  { label: "Q1", value: "What budget is approved, and what downside capacity are we prepared to carry?" },
                  { label: "Q2", value: "Who owns execution, and what team capacity can be committed?" },
                  { label: "Q3", value: "What measurable outcome must this strategy achieve?" },
                  { label: "Q4", value: "Is any non-negotiable legal, security, or procurement constraint unresolved?" }
                ]),
                makeBlock("decision-paths", "bars", "01", "Competing decision paths", "Internal answers strengthen, weaken, or prune only the paths they directly affect.", "full", "tall", "DecisionWorkspaceView.vue", [
                  { label: "Driven largely by AI-memory demand", value: "66" },
                  { label: "Durable HBM leadership remains unproven", value: "49" },
                  { label: "Peak of another memory cycle", value: "48" },
                  { label: "Overcapacity if AI spending slows", value: "36" }
                ]),
                makeBlock("decision-evidence", "split", "02", "Evidence and provenance", "Review claims, assumptions, contradictions, and internal facts without mixing their provenance.", "full", "tall", "DecisionWorkspaceView.vue", [
                  { label: "Claims", value: "209" },
                  { label: "Assumptions", value: "6" },
                  { label: "Contradictions", value: "0" },
                  { label: "Internal evidence", value: "3 facts" }
                ]),
                makeBlock("decision-changes", "timeline", "03", "How answers changed the decision", "A before-and-after trail records every material branch update.", "full", "standard", "DecisionWorkspaceView.vue", [
                  { label: "Internal fact recorded", value: "Strengthened 4 paths; weakened 0; pruned 0." },
                  { label: "Question score updated", value: "Remaining question priority fell below the previous maximum." },
                  { label: "Stop policy reevaluated", value: "Continue until no unresolved question is material." }
                ]),
                makeBlock("decision-memo", "memo", "04", "Executive decision memo", "The memo combines the recommendation, deterministic analysis, missing confirmations, information priorities, and stop reason.", "half", "tall", "DecisionWorkspaceView.vue", [
                  { label: "Recommendation", value: "Driven largely by AI-memory demand." },
                  { label: "Decision status", value: "Interim" },
                  { label: "Next action", value: "Resolve the highest-priority internal fact." }
                ]),
                makeBlock("decision-audit", "timeline", "05", "Decision audit trail", "Every source, question, answer, branch update, and stop event remains inspectable.", "half", "tall", "DecisionWorkspaceView.vue", [
                  { label: "Import completed", value: "Core report analyzed." },
                  { label: "Evidence classified", value: "Public and internal provenance retained." },
                  { label: "Question prioritized", value: "Bounded question queue generated." },
                  { label: "Decision updated", value: "Affected paths recalculated." }
                ])
              ]
            }
          ]
        };
      }

      var baseline = initialModel();
      var model = loadModel() || initialModel();

      function clone(value) {
        return JSON.parse(JSON.stringify(value));
      }

      function loadModel() {
        try {
          var raw = localStorage.getItem(storageKey);
          if (!raw) return null;
          var saved = JSON.parse(raw);
          return saved && Array.isArray(saved.pages) ? saved : null;
        } catch (error) {
          return null;
        }
      }

      function saveModel(message) {
        try {
          localStorage.setItem(storageKey, JSON.stringify(model));
          saveStatus.textContent = message || "Autosaved locally.";
        } catch (error) {
          saveStatus.textContent = "Edits are active. Download a review file to save them.";
        }
      }

      function snapshot() {
        return JSON.stringify(model);
      }

      function commit(mutator, message) {
        historyStack.push(snapshot());
        if (historyStack.length > 60) historyStack.shift();
        futureStack = [];
        mutator();
        saveModel(message);
        render();
      }

      function undo() {
        if (!historyStack.length) return;
        futureStack.push(snapshot());
        model = JSON.parse(historyStack.pop());
        saveModel("Undid the last change.");
        render();
      }

      function redo() {
        if (!futureStack.length) return;
        historyStack.push(snapshot());
        model = JSON.parse(futureStack.pop());
        saveModel("Restored the change.");
        render();
      }

      function activePage() {
        return model.pages.find(function (page) { return page.id === model.activePage; }) || model.pages[0];
      }

      function selectedBlock() {
        var page = activePage();
        return page.blocks.find(function (block) { return block.id === model.selectedBlock; }) || null;
      }

      function htmlSafe(value) {
        return String(value == null ? "" : value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function editable(tag, className, text, blockId, field, itemIndex) {
        var attrs = " class=\"" + className + "\" data-block-id=\"" + htmlSafe(blockId) + "\" data-field=\"" + htmlSafe(field) + "\"";
        if (itemIndex !== undefined) attrs += " data-item-index=\"" + itemIndex + "\"";
        if (model.mode === "edit") attrs += " contenteditable=\"true\" spellcheck=\"true\"";
        return "<" + tag + attrs + ">" + htmlSafe(text) + "</" + tag + ">";
      }

      function renderItems(block, mode) {
        var items = block.items || [];
        if (!items.length) return "";
        if (mode === "metrics") {
          return "<div class=\"ffe-metrics\">" + items.map(function (item, index) {
            return "<div class=\"ffe-metric\">" +
              editable("strong", "", item.value, block.id, "item-value", index) +
              editable("span", "text-small text-muted", item.label, block.id, "item-label", index) +
            "</div>";
          }).join("") + "</div>";
        }
        if (mode === "bars") {
          return "<div class=\"ffe-bars\">" + items.map(function (item, index) {
            var amount = Math.max(0, Math.min(100, parseFloat(item.value) || 0));
            return "<div class=\"ffe-row\">" +
              "<div class=\"ffe-feedback-topline\">" +
                editable("span", "", item.label, block.id, "item-label", index) +
                editable("strong", "", item.value + "%", block.id, "item-value-percent", index) +
              "</div>" +
              "<div class=\"ffe-bar-track\" aria-hidden=\"true\"><span class=\"ffe-bar-fill\" style=\"width:" + amount + "%\"></span></div>" +
            "</div>";
          }).join("") + "</div>";
        }
        if (mode === "tree") {
          return "<div class=\"ffe-tree\" role=\"img\" aria-label=\"Editable decision knowledge tree\">" + items.map(function (item, index) {
            return "<div class=\"ffe-tree-node\">" +
              editable("span", "text-small text-muted", item.label, block.id, "item-label", index) +
              editable("strong", "", item.value, block.id, "item-value", index) +
            "</div>";
          }).join("") + "</div>";
        }
        if (mode === "timeline") {
          return "<div class=\"ffe-timeline\">" + items.map(function (item, index) {
            return "<div class=\"ffe-row\">" +
              editable("strong", "", item.label, block.id, "item-label", index) +
              editable("span", "text-small text-muted", item.value, block.id, "item-value", index) +
            "</div>";
          }).join("") + "</div>";
        }
        if (mode === "columns") {
          return "<div class=\"ffe-columns\">" + items.map(function (item, index) {
            return "<div class=\"ffe-row\">" +
              editable("span", "text-small text-muted", item.label, block.id, "item-label", index) +
              editable("strong", "", item.value, block.id, "item-value", index) +
            "</div>";
          }).join("") + "</div>";
        }
        return "<div class=\"ffe-row-list\">" + items.map(function (item, index) {
          return "<div class=\"ffe-row\">" +
            editable("strong", "", item.label, block.id, "item-label", index) +
            editable("span", "text-small text-muted", item.value, block.id, "item-value", index) +
          "</div>";
        }).join("") + "</div>";
      }

      function renderVisual(block) {
        if (block.kind === "hero") return renderItems(block, "metrics");
        if (block.kind === "upload") {
          var uploadLabel = block.items[0] ? block.items[0].label : "Drop files here";
          return "<div class=\"ffe-dropzone\">" +
            editable("strong", "", uploadLabel, block.id, "item-label", 0) +
          "</div>";
        }
        if (block.kind === "tree") return renderItems(block, "tree");
        if (block.kind === "bars") return renderItems(block, "bars");
        if (block.kind === "timeline") return renderItems(block, "timeline");
        if (block.kind === "split") return renderItems(block, "columns");
        if (block.kind === "questions") {
          var midpoint = Math.ceil(block.items.length / 2);
          var queue = Object.assign({}, block, { items: block.items.slice(0, midpoint) });
          var detail = Object.assign({}, block, { items: block.items.slice(midpoint) });
          return "<div class=\"ffe-question-layout\">" +
            "<div><span class=\"viz-badge\">Ranked queue</span>" + renderItems(queue, "list") + "</div>" +
            "<div><span class=\"viz-badge\">Selected question</span>" + renderItems(detail, "list") + "</div>" +
          "</div>";
        }
        if (block.kind === "memo") return renderItems(block, "list");
        return renderItems(block, "list");
      }

      function renderBlock(block, index) {
        if (block.hidden && model.mode === "preview") return "";
        var selected = model.selectedBlock === block.id ? " is-selected" : "";
        var hidden = block.hidden ? " is-hidden" : "";
        var feedbackOpen = block.feedback.filter(function (item) { return item.status !== "resolved"; }).length;
        var controls = "";
        if (model.mode === "edit") {
          controls =
            "<div class=\"ffe-block-actions editor-only\">" +
              (!block.locked ? "<button type=\"button\" class=\"btn btn-ghost ffe-drag\" data-action=\"drag\" data-id=\"" + htmlSafe(block.id) + "\" aria-label=\"Drag section\">Drag</button>" : "") +
              "<button type=\"button\" class=\"btn btn-ghost\" data-action=\"move-up\" data-id=\"" + htmlSafe(block.id) + "\" aria-label=\"Move section up\">Up</button>" +
              "<button type=\"button\" class=\"btn btn-ghost\" data-action=\"move-down\" data-id=\"" + htmlSafe(block.id) + "\" aria-label=\"Move section down\">Down</button>" +
              "<button type=\"button\" class=\"btn btn-ghost\" data-action=\"collapse\" data-id=\"" + htmlSafe(block.id) + "\">" + (block.collapsed ? "Expand" : "Collapse") + "</button>" +
            "</div>";
        }
        var content = block.hidden
          ? "<div class=\"text-small text-muted\">Hidden in Preview. Select this section and use Show in the inspector.</div>"
          : (block.collapsed ? "" : "<div class=\"ffe-block-content\">" + renderVisual(block) + "</div>");
        return "<article class=\"card ffe-block" + selected + hidden + "\" data-block-id=\"" + htmlSafe(block.id) + "\" data-width=\"" + htmlSafe(block.width) + "\" data-height=\"" + htmlSafe(block.height) + "\" data-index=\"" + index + "\">" +
          "<div class=\"ffe-block-topline\">" +
            "<span class=\"viz-badge\">" + htmlSafe(block.eyebrow) + "</span>" +
            (feedbackOpen ? "<span class=\"viz-badge\">" + feedbackOpen + " feedback</span>" : "") +
            controls +
          "</div>" +
          "<div class=\"ffe-block-copy\">" +
            editable("h3", "ffe-block-title", block.title, block.id, "title") +
            editable("div", "text-small text-muted", block.body, block.id, "body") +
            "<span class=\"ffe-source-tag text-small\">Maps to " + htmlSafe(block.file || "new component") + "</span>" +
          "</div>" +
          content +
        "</article>";
      }

      function renderPages() {
        pageList.innerHTML = model.pages.map(function (page, index) {
          var active = page.id === model.activePage;
          var count = page.feedback.filter(function (item) { return item.status !== "resolved"; }).length;
          page.blocks.forEach(function (block) {
            count += block.feedback.filter(function (item) { return item.status !== "resolved"; }).length;
          });
          return "<button type=\"button\" class=\"btn" + (active ? " btn-primary" : "") + "\" data-action=\"set-page\" data-page=\"" + htmlSafe(page.id) + "\" aria-pressed=\"" + active + "\">" +
            "<span>" + (index + 1) + ". " + htmlSafe(page.title) + "</span>" +
            (count ? "<span class=\"viz-badge\">" + count + "</span>" : "") +
          "</button>";
        }).join("");
      }

      function renderCanvas() {
        var page = activePage();
        document.getElementById("ffe-page-step").textContent = page.step;
        document.getElementById("ffe-page-title").textContent = page.title;
        document.getElementById("ffe-page-description").textContent = page.description;
        frame.setAttribute("data-device", model.device);
        pageCanvas.innerHTML = page.blocks.map(renderBlock).join("") +
          "<footer class=\"ffe-legal text-small text-muted\">" +
            "<span>FOREFOLD originated as a modified version of MiroFish.</span>" +
            "<span>Corresponding source · Upstream project · GNU AGPL v3 · No warranty</span>" +
          "</footer>";
      }

      function feedbackEditor(scopeLabel, feedback) {
        var entries = feedback.length ? feedback.map(function (item) {
          return "<div class=\"ffe-feedback-item\" data-status=\"" + htmlSafe(item.status) + "\">" +
            "<div class=\"ffe-feedback-topline\"><strong>" + htmlSafe(item.type) + "</strong><span class=\"text-small text-muted\">" + htmlSafe(item.status) + "</span></div>" +
            "<div>" + htmlSafe(item.comment) + "</div>" +
            (item.status !== "resolved" ? "<button type=\"button\" class=\"btn btn-ghost\" data-action=\"resolve-feedback\" data-feedback-id=\"" + htmlSafe(item.id) + "\">Resolve</button>" : "") +
          "</div>";
        }).join("") : "<div class=\"text-small text-muted\">No feedback yet.</div>";
        return "<div class=\"ffe-field-group\">" +
          "<div class=\"ffe-feedback-topline\"><strong>Feedback</strong><span class=\"text-small text-muted\">" + htmlSafe(scopeLabel) + "</span></div>" +
          "<label class=\"form-label\">Type<select class=\"form-select\" id=\"ffe-feedback-type\"><option value=\"change request\">Change request</option><option value=\"question\">Question</option><option value=\"approval\">Approval</option><option value=\"note\">Note</option></select></label>" +
          "<label class=\"form-label\">Comment<textarea class=\"form-control\" id=\"ffe-feedback-comment\" rows=\"4\" placeholder=\"What should change, and why?\"></textarea></label>" +
          "<button type=\"button\" class=\"btn btn-primary\" data-action=\"add-feedback\">Add feedback</button>" +
          "<div class=\"ffe-feedback-list\">" + entries + "</div>" +
        "</div>";
      }

      function renderInspector() {
        var page = activePage();
        var block = selectedBlock();
        if (!block) {
          inspector.innerHTML =
            "<div class=\"ffe-inspector-fields\">" +
              "<div><strong>Page settings</strong><div class=\"text-small text-muted\">Select a section to edit its layout and feedback.</div></div>" +
              "<label class=\"form-label\">Page title<input class=\"form-control\" data-page-field=\"title\" value=\"" + htmlSafe(page.title) + "\"></label>" +
              "<label class=\"form-label\">Description<textarea class=\"form-control\" data-page-field=\"description\" rows=\"3\">" + htmlSafe(page.description) + "</textarea></label>" +
              feedbackEditor(page.title, page.feedback) +
            "</div>";
          return;
        }
        inspector.innerHTML =
          "<div class=\"ffe-inspector-fields\">" +
            "<div><strong>Section properties</strong><div class=\"text-small text-muted\">" + htmlSafe(block.file || "New component") + "</div></div>" +
            "<label class=\"form-label\">Eyebrow<input class=\"form-control\" data-block-field=\"eyebrow\" value=\"" + htmlSafe(block.eyebrow) + "\"></label>" +
            "<label class=\"form-label\">Title<input class=\"form-control\" data-block-field=\"title\" value=\"" + htmlSafe(block.title) + "\"></label>" +
            "<label class=\"form-label\">Description<textarea class=\"form-control\" data-block-field=\"body\" rows=\"4\">" + htmlSafe(block.body) + "</textarea></label>" +
            "<label class=\"form-label\">Width<select class=\"form-select\" data-block-field=\"width\">" +
              "<option value=\"full\"" + (block.width === "full" ? " selected" : "") + ">Full</option>" +
              "<option value=\"half\"" + (block.width === "half" ? " selected" : "") + ">Half</option>" +
              "<option value=\"third\"" + (block.width === "third" ? " selected" : "") + ">Third</option>" +
            "</select></label>" +
            "<label class=\"form-label\">Minimum height<select class=\"form-select\" data-block-field=\"height\">" +
              "<option value=\"compact\"" + (block.height === "compact" ? " selected" : "") + ">Compact</option>" +
              "<option value=\"standard\"" + (block.height === "standard" ? " selected" : "") + ">Standard</option>" +
              "<option value=\"tall\"" + (block.height === "tall" ? " selected" : "") + ">Tall</option>" +
            "</select></label>" +
            "<div class=\"viz-row\">" +
              "<button type=\"button\" class=\"btn\" data-action=\"duplicate\" data-id=\"" + htmlSafe(block.id) + "\"" + (block.locked ? " disabled" : "") + ">Duplicate</button>" +
              "<button type=\"button\" class=\"btn\" data-action=\"" + (block.hidden ? "show" : "hide") + "\" data-id=\"" + htmlSafe(block.id) + "\"" + (block.locked ? " disabled" : "") + ">" + (block.hidden ? "Show" : "Hide") + "</button>" +
              "<button type=\"button\" class=\"btn\" data-action=\"delete\" data-id=\"" + htmlSafe(block.id) + "\"" + (block.locked ? " disabled" : "") + ">Delete</button>" +
              "<button type=\"button\" class=\"btn btn-ghost\" data-action=\"select-none\">Page settings</button>" +
            "</div>" +
            feedbackEditor(block.title, block.feedback) +
          "</div>";
      }

      function unresolvedFeedbackCount() {
        var count = 0;
        model.pages.forEach(function (page) {
          count += page.feedback.filter(function (item) { return item.status !== "resolved"; }).length;
          page.blocks.forEach(function (block) {
            count += block.feedback.filter(function (item) { return item.status !== "resolved"; }).length;
          });
        });
        return count;
      }

      function renderToolbarState() {
        root.classList.toggle("is-preview", model.mode === "preview");
        root.querySelectorAll("[data-action=\"mode\"]").forEach(function (button) {
          var active = button.getAttribute("data-mode") === model.mode;
          button.setAttribute("aria-pressed", String(active));
          button.classList.toggle("btn-primary", active);
        });
        root.querySelectorAll("[data-action=\"device\"]").forEach(function (button) {
          var active = button.getAttribute("data-device") === model.device;
          button.setAttribute("aria-pressed", String(active));
          button.classList.toggle("btn-primary", active);
        });
        reviewCount.textContent = unresolvedFeedbackCount() + " open feedback";
      }

      function render() {
        renderPages();
        renderCanvas();
        renderInspector();
        renderToolbarState();
      }

      function blockById(id) {
        return activePage().blocks.find(function (block) { return block.id === id; });
      }

      function moveBlock(id, delta) {
        var blocks = activePage().blocks;
        var from = blocks.findIndex(function (block) { return block.id === id; });
        var to = Math.max(0, Math.min(blocks.length - 1, from + delta));
        if (from < 0 || from === to) return;
        commit(function () {
          var moved = blocks.splice(from, 1)[0];
          blocks.splice(to, 0, moved);
          model.selectedBlock = id;
        }, "Section reordered.");
      }

      function reorderBlock(fromId, toId) {
        var blocks = activePage().blocks;
        var from = blocks.findIndex(function (block) { return block.id === fromId; });
        var to = blocks.findIndex(function (block) { return block.id === toId; });
        if (from < 0 || to < 0 || from === to) return;
        commit(function () {
          var moved = blocks.splice(from, 1)[0];
          blocks.splice(to, 0, moved);
          model.selectedBlock = fromId;
        }, "Section reordered.");
      }

      function addFeedback() {
        var commentField = document.getElementById("ffe-feedback-comment");
        var typeField = document.getElementById("ffe-feedback-type");
        var comment = commentField ? commentField.value.trim() : "";
        if (!comment) {
          saveStatus.textContent = "Write a feedback comment first.";
          return;
        }
        commit(function () {
          var block = selectedBlock();
          var target = block ? block.feedback : activePage().feedback;
          target.push({
            id: "feedback-" + Date.now(),
            type: typeField.value,
            comment: comment,
            status: typeField.value === "approval" ? "approved" : "open",
            createdAt: new Date().toISOString()
          });
        }, "Feedback added.");
      }

      function resolveFeedback(id) {
        commit(function () {
          var collections = [activePage().feedback];
          activePage().blocks.forEach(function (block) { collections.push(block.feedback); });
          collections.forEach(function (list) {
            var item = list.find(function (entry) { return entry.id === id; });
            if (item) item.status = "resolved";
          });
        }, "Feedback resolved.");
      }

      function changesFromBaseline() {
        var changes = [];
        model.pages.forEach(function (page) {
          var originalPage = baseline.pages.find(function (candidate) { return candidate.id === page.id; });
          if (!originalPage) {
            changes.push(page.title + ": added page");
            return;
          }
          if (page.title !== originalPage.title || page.description !== originalPage.description) {
            changes.push(page.title + ": page copy changed");
          }
          var originalOrder = originalPage.blocks.map(function (block) { return block.id; }).join(",");
          var currentOrder = page.blocks.map(function (block) { return block.id; }).join(",");
          if (originalOrder !== currentOrder) changes.push(page.title + ": section order changed");
          page.blocks.forEach(function (block) {
            var original = originalPage.blocks.find(function (candidate) { return candidate.id === block.id; });
            if (!original) {
              changes.push(page.title + " / " + block.title + ": added section");
              return;
            }
            if (JSON.stringify(block) !== JSON.stringify(original)) {
              changes.push(page.title + " / " + block.title + ": edited");
            }
          });
        });
        return changes;
      }

      function reviewPayload() {
        return {
          format: "forefold-review",
          version: 1,
          exportedAt: new Date().toISOString(),
          sourceReference: "screencapture-127-0-0-1-3000-decision-v2-20260719093433-3951ef63-2026-07-19-09_38_34.pdf",
          instructions: "Send this JSON file back to Codex. It contains every page edit, layout order, hidden section, and feedback note needed to apply the design to the production frontend.",
          changeSummary: changesFromBaseline(),
          model: model
        };
      }

      function downloadReview() {
        var payload = JSON.stringify(reviewPayload(), null, 2);
        var blob = new Blob([payload], { type: "application/json" });
        var url = URL.createObjectURL(blob);
        var link = document.createElement("a");
        link.href = url;
        link.download = "forefold-review-" + new Date().toISOString().slice(0, 10) + ".json";
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        saveStatus.textContent = "Review file downloaded. Send that file back to Codex.";
      }

      function copyApplyBrief() {
        var payload = reviewPayload();
        var openNotes = [];
        model.pages.forEach(function (page) {
          page.feedback.filter(function (item) { return item.status !== "resolved"; }).forEach(function (item) {
            openNotes.push(page.title + ": " + item.type + " - " + item.comment);
          });
          page.blocks.forEach(function (block) {
            block.feedback.filter(function (item) { return item.status !== "resolved"; }).forEach(function (item) {
              openNotes.push(page.title + " / " + block.title + ": " + item.type + " - " + item.comment);
            });
          });
        });
        var brief = "Apply this FOREFOLD frontend review to the production Vue pages.\n\nChanged areas:\n- " +
          (payload.changeSummary.length ? payload.changeSummary.join("\n- ") : "No structural edits recorded") +
          "\n\nOpen feedback:\n- " +
          (openNotes.length ? openNotes.join("\n- ") : "No open feedback");
        navigator.clipboard.writeText(brief).then(function () {
          saveStatus.textContent = "Apply brief copied.";
        }).catch(function () {
          saveStatus.textContent = "Clipboard unavailable. Download the review file instead.";
        });
      }

      root.addEventListener("click", function (event) {
        var actionNode = event.target.closest("[data-action]");
        if (actionNode) {
          var action = actionNode.getAttribute("data-action");
          var id = actionNode.getAttribute("data-id");
          if (action === "set-page") {
            model.activePage = actionNode.getAttribute("data-page");
            model.selectedBlock = null;
            saveModel("Page changed.");
            render();
          } else if (action === "mode") {
            model.mode = actionNode.getAttribute("data-mode");
            saveModel("Mode changed.");
            render();
          } else if (action === "device") {
            model.device = actionNode.getAttribute("data-device");
            saveModel("Canvas width changed.");
            render();
          } else if (action === "undo") {
            undo();
          } else if (action === "redo") {
            redo();
          } else if (action === "move-up") {
            moveBlock(id, -1);
          } else if (action === "move-down") {
            moveBlock(id, 1);
          } else if (action === "collapse") {
            commit(function () {
              blockById(id).collapsed = !blockById(id).collapsed;
              model.selectedBlock = id;
            }, "Section collapsed state changed.");
          } else if (action === "duplicate") {
            commit(function () {
              var source = blockById(id);
              var duplicate = clone(source);
              duplicate.id = source.id + "-copy-" + Date.now();
              duplicate.title = source.title + " copy";
              duplicate.feedback = [];
              var index = activePage().blocks.indexOf(source);
              activePage().blocks.splice(index + 1, 0, duplicate);
              model.selectedBlock = duplicate.id;
            }, "Section duplicated.");
          } else if (action === "hide" || action === "show") {
            commit(function () {
              blockById(id).hidden = action === "hide";
              model.selectedBlock = id;
            }, action === "hide" ? "Section hidden." : "Section shown.");
          } else if (action === "delete") {
            var target = blockById(id);
            if (target && !target.locked) {
              commit(function () {
                activePage().blocks = activePage().blocks.filter(function (block) { return block.id !== id; });
                model.selectedBlock = null;
              }, "Section deleted.");
            }
          } else if (action === "select-none") {
            model.selectedBlock = null;
            saveModel("Page settings selected.");
            render();
          } else if (action === "add-block") {
            commit(function () {
              var newBlock = makeBlock(
                "custom-" + Date.now(),
                "list",
                "New section",
                "Editable section",
                "Click any text to edit it, then use the inspector to adjust the layout.",
                "full",
                "standard",
                "New component",
                [
                  { label: "First item", value: "Add detail" },
                  { label: "Second item", value: "Add detail" }
                ]
              );
              activePage().blocks.push(newBlock);
              model.selectedBlock = newBlock.id;
            }, "Section added.");
          } else if (action === "add-feedback") {
            addFeedback();
          } else if (action === "resolve-feedback") {
            resolveFeedback(actionNode.getAttribute("data-feedback-id"));
          } else if (action === "download-review") {
            downloadReview();
          } else if (action === "copy-brief") {
            copyApplyBrief();
          } else if (action === "import-review") {
            importInput.click();
          } else if (action === "reset") {
            commit(function () {
              model = initialModel();
            }, "Demo content reset.");
          }
          return;
        }

        if (model.mode === "edit") {
          var blockNode = event.target.closest("[data-block-id]");
          if (blockNode) {
            var nextId = blockNode.getAttribute("data-block-id");
            if (nextId && blockById(nextId)) {
              model.selectedBlock = nextId;
              saveModel("Section selected.");
              renderInspector();
              renderCanvas();
              renderToolbarState();
            }
          }
        }
      });

      root.addEventListener("focusin", function (event) {
        if (
          event.target.matches("[contenteditable=\"true\"]") ||
          event.target.hasAttribute("data-block-field") ||
          event.target.hasAttribute("data-page-field")
        ) {
          inlineBefore = snapshot();
        }
      });

      root.addEventListener("input", function (event) {
        var blockProperty = event.target.getAttribute("data-block-field");
        var pageProperty = event.target.getAttribute("data-page-field");
        if (blockProperty) {
          var selected = selectedBlock();
          if (!selected) return;
          selected[blockProperty] = event.target.value;
          saveModel("Editing...");
          renderCanvas();
          return;
        }
        if (pageProperty) {
          activePage()[pageProperty] = event.target.value;
          saveModel("Editing...");
          renderPages();
          renderCanvas();
          return;
        }
        if (!event.target.matches("[contenteditable=\"true\"]")) return;
        var id = event.target.getAttribute("data-block-id");
        var field = event.target.getAttribute("data-field");
        var index = event.target.getAttribute("data-item-index");
        var block = blockById(id);
        if (!block) return;
        var value = event.target.textContent;
        if (field === "item-label") block.items[Number(index)].label = value;
        else if (field === "item-value") block.items[Number(index)].value = value;
        else if (field === "item-value-percent") block.items[Number(index)].value = value.replace(/%/g, "").trim();
        else block[field] = value;
        saveModel("Editing...");
      });

      root.addEventListener("focusout", function (event) {
        var tracked =
          event.target.matches("[contenteditable=\"true\"]") ||
          event.target.hasAttribute("data-block-field") ||
          event.target.hasAttribute("data-page-field");
        if (!tracked || inlineBefore == null) return;
        if (inlineBefore !== snapshot()) {
          historyStack.push(inlineBefore);
          if (historyStack.length > 60) historyStack.shift();
          futureStack = [];
          saveModel("Inline edit saved.");
        }
        inlineBefore = null;
        if (event.target.matches("[contenteditable=\"true\"]")) renderInspector();
      });

      root.addEventListener("pointerdown", function (event) {
        var handle = event.target.closest("[data-action=\"drag\"]");
        if (!handle || model.mode !== "edit") return;
        event.preventDefault();
        pointerDragId = handle.getAttribute("data-id");
        pointerTargetId = pointerDragId;
        if (handle.setPointerCapture) handle.setPointerCapture(event.pointerId);
        var node = pageCanvas.querySelector("[data-block-id=\"" + pointerDragId + "\"]");
        if (node) node.classList.add("is-dragging");
      });

      root.addEventListener("pointermove", function (event) {
        if (!pointerDragId) return;
        var hit = document.elementFromPoint(event.clientX, event.clientY);
        var target = hit && hit.closest ? hit.closest(".ffe-block") : null;
        pageCanvas.querySelectorAll(".is-drop-target").forEach(function (node) {
          node.classList.remove("is-drop-target");
        });
        if (!target) return;
        pointerTargetId = target.getAttribute("data-block-id");
        if (pointerTargetId && pointerTargetId !== pointerDragId) target.classList.add("is-drop-target");
      });

      function finishPointerDrag() {
        if (!pointerDragId) return;
        var fromId = pointerDragId;
        var toId = pointerTargetId;
        pointerDragId = null;
        pointerTargetId = null;
        pageCanvas.querySelectorAll(".is-dragging, .is-drop-target").forEach(function (node) {
          node.classList.remove("is-dragging", "is-drop-target");
        });
        if (toId && fromId !== toId) reorderBlock(fromId, toId);
      }

      root.addEventListener("pointerup", finishPointerDrag);
      root.addEventListener("pointercancel", finishPointerDrag);

      importInput.addEventListener("change", function () {
        var file = importInput.files && importInput.files[0];
        if (!file) return;
        var reader = new FileReader();
        reader.onload = function () {
          try {
            var parsed = JSON.parse(String(reader.result));
            var nextModel = parsed.format === "forefold-review" ? parsed.model : parsed;
            if (!nextModel || !Array.isArray(nextModel.pages)) throw new Error("Invalid review file");
            commit(function () {
              model = nextModel;
              model.mode = "edit";
            }, "Review file imported.");
          } catch (error) {
            saveStatus.textContent = "Could not import that file. Use a FOREFOLD review JSON.";
          }
          importInput.value = "";
        };
        reader.readAsText(file);
      });

      render();
    })();
  </script>
</div>

<script src="https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js"></script>
<script src="https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js"></script>
<script>
(() => {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set(["top", "right", "bottom", "left"]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =>
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest("[data-tooltip]")
      : null;
  const containsTarget = (trigger, target) =>
    target?.nodeType != null && trigger.contains(target);
  const getContent = (trigger) =>
    trigger.getAttribute("data-tooltip")?.trim() ?? "";
  const getPlacement = (trigger) => {
    const placement = trigger.getAttribute("data-tooltip-placement");
    return tooltipPlacements.has(placement) ? placement : "top";
  };
  const getTooltip = () => {
    if (tooltip == null) {
      tooltip = document.createElement("div");
      tooltip.id = tooltipId;
      tooltip.className = "tooltip";
      tooltip.setAttribute("role", "tooltip");
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) => {
    const ids = new Set(
      (trigger.getAttribute("aria-describedby") ?? "")
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute("aria-describedby");
    } else {
      trigger.setAttribute("aria-describedby", [...ids].join(" "));
    }
  };
  const clearOpenTimeout = () => {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) => {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) => {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              "--tooltip-available-width",
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              "--tooltip-available-height",
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: "fixed",
    })
      .then(({ x, y }) => {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = "visible";
      })
      .catch(() => {
        if (activeTrigger === trigger && request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) => {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = "hidden";
    floating.style.transform = "translate(0, 0)";
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () => {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) => {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() < skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() => {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) => {
    if (event.pointerType === "touch") {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) => {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) => {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(":focus-visible")) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) => {
    if (event.key === "Escape") {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) => {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () => {
    closeTooltip(false);
    document.removeEventListener("pointerover", handlePointerOpen);
    document.removeEventListener("pointerout", handleLeave);
    document.removeEventListener("focusin", handleFocusIn);
    document.removeEventListener("focusout", handleLeave);
    document.removeEventListener("keydown", handleKeyDown);
    document.removeEventListener("contextmenu", handleContextMenu);
    tooltip = null;
  };

  document.addEventListener("pointerover", handlePointerOpen);
  document.addEventListener("pointerout", handleLeave);
  document.addEventListener("focusin", handleFocusIn);
  document.addEventListener("focusout", handleLeave);
  document.addEventListener("keydown", handleKeyDown);
  document.addEventListener("contextmenu", handleContextMenu);
  window.addEventListener("pagehide", destroy, { once: true });
})();
</script>
<script id="codex-visualization-lucide" async src="https://unpkg.com/lucide@1.17.0/dist/umd/lucide.js"></script>
<script>
(() => {
  const initialize = () => {
    globalThis.lucide?.createIcons({ attrs: { width: 16, height: 16 } });
  };
  if (globalThis.lucide != null) {
    initialize();
    return;
  }
  document
    .getElementById("codex-visualization-lucide")
    ?.addEventListener("load", initialize, { once: true });
})();
</script>
