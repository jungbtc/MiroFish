services:
  falkordb:
    image: falkordb/falkordb:latest
    container_name: mirofish-falkordb
    profiles:
      - graphiti
    ports:
      - "127.0.0.1:6379:6379"
      - "127.0.0.1:3002:3000"
    restart: unless-stopped

  mirofish:
    # Build this checkout so the container includes the current v2/privacy code.
    build:
      context: .
    image: jungbtc/mirofish:local
    container_name: mirofish
    env_file:
      - .env
    environment:
      # The frontend proxy reaches Flask over loopback; direct non-loopback v2
      # calls still require V2_API_KEY.
      - FLASK_HOST=0.0.0.0
      - VITE_HOST=0.0.0.0
      - FALKORDB_HOST=falkordb
    ports:
      # Decision cases may contain private evidence; expose locally by default.
      - "127.0.0.1:3000:3000"
      - "127.0.0.1:5001:5001"
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/backend/uploads
